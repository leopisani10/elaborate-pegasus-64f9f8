<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento confirmado · Dona Baby+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/footer.js"></script>
  <script defer src="js/mobile-menu.js"></script>
  <style>
    body { background: #FAFBFC; min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 18px 0; border-bottom: 1px solid var(--line); background: white; text-align: center; }
    .header img { height: 32px; }

    .success-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }

    .success-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 56px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 48px -24px rgba(14,22,32,0.1);
      position: relative;
      z-index: 2;
    }

    .check-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--baba-soft);
      color: var(--baba-deep);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: pop 0.4s ease-out;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-card h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.035em;
      margin-bottom: 12px;
    }
    .success-card p {
      color: var(--ink-2);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-cta-lg {
      background: var(--cta);
      color: white;
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 16px -4px rgba(235,95,45,0.4);
      text-decoration: none;
    }
    .btn-cta-lg:hover { background: var(--cta-hover); transform: translateY(-1px); }

    .btn-secondary-lg {
      background: white;
      color: var(--ink);
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid var(--line-strong);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-secondary-lg:hover { border-color: var(--ink); }

    .bg-blob {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      pointer-events: none;
      background: radial-gradient(circle, var(--baba-soft), transparent 70%);
    }
    .bg-blob-1 { top: -180px; left: -180px; }
    .bg-blob-2 { bottom: -180px; right: -180px; background: radial-gradient(circle, var(--familia-soft), transparent 70%); }

    .loading-state {
      font-size: 14px;
      color: var(--ink-3);
      margin: 8px 0 24px;
    }
  </style>
</head>
<body>

<header class="header">
  <img src="logo.png" alt="Dona Baby+">
</header>

<main class="success-main">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <div class="success-card">
    <div class="check-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Pagamento confirmado!</h1>
    <p id="successMsg">Sua assinatura está ativa. Você já pode aproveitar todos os recursos do Dona Baby+.</p>
    <div class="loading-state" id="loadingState">Confirmando com o banco...</div>
    <div class="actions" id="actions" style="display: none;">
      <a href="#" id="goNext" class="btn-cta-lg">
        Continuar
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
      <a href="account.html" class="btn-secondary-lg">Ver minha conta</a>
    </div>
  </div>
</main>

<script>
  window.addEventListener('DOMContentLoaded', async () => {
    if (!window.dbClient) { setTimeout(() => location.reload(), 800); return; }
    await window.dbHelpers.requireAuth();

    // O webhook do Stripe pode levar 2-5 segundos pra processar.
    // Tenta buscar a subscription até ela aparecer ativa.
    let attempts = 0;
    const maxAttempts = 8;
    const interval = setInterval(async () => {
      attempts++;
      const profile = await window.dbHelpers.getCurrentProfile();
      if (!profile) { clearInterval(interval); return; }

      const { data: sub } = await window.dbClient
        .from('subscriptions')
        .select('*')
        .eq('user_id', profile.id)
        .maybeSingle();

      if (sub && ['active', 'trialing'].includes(sub.status)) {
        clearInterval(interval);
        showReady(profile, sub);
      } else if (attempts >= maxAttempts) {
        clearInterval(interval);
        showSlowConfirm(profile);
      }
    }, 1500);
  });

  async function showReady(profile, sub) {
    document.getElementById('loadingState').style.display = 'none';

    const nextBtn = document.getElementById('goNext');

    if (profile.user_type === 'baba') {
      // Babá: depois de pagar, ainda precisa de aprovação
      const baba = await window.dbHelpers.getBabaProfile(profile.id);

      if (baba && baba.approval_status === 'approved') {
        document.getElementById('successMsg').textContent =
          `${sub.plan_name} ativo. Sua conta já tá aprovada, pode buscar famílias.`;
        nextBtn.href = '/families.html';
        nextBtn.querySelector('svg').previousSibling.textContent = 'Buscar famílias ';
      } else {
        document.getElementById('successMsg').innerHTML =
          `${sub.plan_name} ativo. Agora seu cadastro está em análise pela nossa equipe — em até 24h te avisamos. <strong>Você não será cobrado até a aprovação.</strong>`;
        nextBtn.href = '/onboarding-baba.html?status=pending';
        nextBtn.querySelector('svg').previousSibling.textContent = 'Ver status ';
      }
    } else if (profile.user_type === 'parent') {
      document.getElementById('successMsg').textContent =
        `${sub.plan_name} ativo. Você já pode aproveitar todos os recursos do Dona Baby+.`;
      nextBtn.href = '/dashboard.html';
      nextBtn.querySelector('svg').previousSibling.textContent = 'Buscar babás ';
    } else {
      document.getElementById('successMsg').textContent =
        `${sub.plan_name} ativo. Você já pode aproveitar todos os recursos do Dona Baby+.`;
      nextBtn.href = '/';
    }
    document.getElementById('actions').style.display = 'flex';
  }

  async function showSlowConfirm(profile) {
    document.getElementById('loadingState').innerHTML =
      'Pagamento confirmado pelo Stripe. A ativação está demorando um pouco — atualize a página em 1 minuto se ainda não aparecer aqui.';
    const nextBtn = document.getElementById('goNext');
    if (profile.user_type === 'baba') {
      nextBtn.href = '/onboarding-baba.html?status=pending';
    } else if (profile.user_type === 'parent') {
      nextBtn.href = '/dashboard.html';
    } else {
      nextBtn.href = '/';
    }
    document.getElementById('actions').style.display = 'flex';
  }
</script>

</body>
</html>
